<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- white background -->
  <circle cx="16" cy="16" r="16" fill="#ffffff"/>

  <g transform="translate(16,16)">
    <!-- 5 petals — broad fan shape with notched tip -->
    <path d="M -2,0 C -5,-2 -7,-7 -5.5,-11 Q -3,-13.5 0,-12 Q 3,-13.5 5.5,-11 C 7,-7 5,-2 2,0 Z" fill="#C0392B" stroke="#9B2320" stroke-width="0.4" transform="rotate(0)"/>
    <path d="M -2,0 C -5,-2 -7,-7 -5.5,-11 Q -3,-13.5 0,-12 Q 3,-13.5 5.5,-11 C 7,-7 5,-2 2,0 Z" fill="#C0392B" stroke="#9B2320" stroke-width="0.4" transform="rotate(72)"/>
    <path d="M -2,0 C -5,-2 -7,-7 -5.5,-11 Q -3,-13.5 0,-12 Q 3,-13.5 5.5,-11 C 7,-7 5,-2 2,0 Z" fill="#C0392B" stroke="#9B2320" stroke-width="0.4" transform="rotate(144)"/>
    <path d="M -2,0 C -5,-2 -7,-7 -5.5,-11 Q -3,-13.5 0,-12 Q 3,-13.5 5.5,-11 C 7,-7 5,-2 2,0 Z" fill="#C0392B" stroke="#9B2320" stroke-width="0.4" transform="rotate(216)"/>
    <path d="M -2,0 C -5,-2 -7,-7 -5.5,-11 Q -3,-13.5 0,-12 Q 3,-13.5 5.5,-11 C 7,-7 5,-2 2,0 Z" fill="#C0392B" stroke="#9B2320" stroke-width="0.4" transform="rotate(288)"/>

    <!-- Lighter highlight stripe down the centre of each petal -->
    <path d="M -0.7,0 C -2,-1 -2.5,-5 -1.8,-9 Q -0.5,-11 0,-10 Q 0.5,-11 1.8,-9 C 2.5,-5 2,-1 0.7,0 Z" fill="#E8564A" opacity="0.55" transform="rotate(0)"/>
    <path d="M -0.7,0 C -2,-1 -2.5,-5 -1.8,-9 Q -0.5,-11 0,-10 Q 0.5,-11 1.8,-9 C 2.5,-5 2,-1 0.7,0 Z" fill="#E8564A" opacity="0.55" transform="rotate(72)"/>
    <path d="M -0.7,0 C -2,-1 -2.5,-5 -1.8,-9 Q -0.5,-11 0,-10 Q 0.5,-11 1.8,-9 C 2.5,-5 2,-1 0.7,0 Z" fill="#E8564A" opacity="0.55" transform="rotate(144)"/>
    <path d="M -0.7,0 C -2,-1 -2.5,-5 -1.8,-9 Q -0.5,-11 0,-10 Q 0.5,-11 1.8,-9 C 2.5,-5 2,-1 0.7,0 Z" fill="#E8564A" opacity="0.55" transform="rotate(216)"/>
    <path d="M -0.7,0 C -2,-1 -2.5,-5 -1.8,-9 Q -0.5,-11 0,-10 Q 0.5,-11 1.8,-9 C 2.5,-5 2,-1 0.7,0 Z" fill="#E8564A" opacity="0.55" transform="rotate(288)"/>

    <!-- Dark red centre -->
    <circle cx="0" cy="0" r="4.2" fill="#7B241C"/>

    <!-- Stamen column -->
    <rect x="-1" y="-7.5" width="2" height="5.5" rx="1" fill="#F39C12"/>

    <!-- Anther cluster at top of stamen -->
    <circle cx="0"    cy="-8"  r="1.6" fill="#F1C40F"/>
    <circle cx="-2"   cy="-7"  r="1.1" fill="#F1C40F"/>
    <circle cx="2"    cy="-7"  r="1.1" fill="#F1C40F"/>
    <circle cx="-1.3" cy="-9.5" r="0.9" fill="#F1C40F"/>
    <circle cx="1.3"  cy="-9.5" r="0.9" fill="#F1C40F"/>

    <!-- White centre dot (style) -->
    <circle cx="0" cy="-1.5" r="1.2" fill="rgba(255,255,255,0.2)"/>
  </g>
</svg>
