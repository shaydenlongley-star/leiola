<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark background pill -->
  <circle cx="16" cy="16" r="16" fill="#1c1208"/>
  <!-- 5 petals -->
  <g transform="translate(16,16)">
    <ellipse cx="0" cy="-5.5" rx="4.5" ry="7.5" fill="#5cb830" transform="rotate(0)"/>
    <ellipse cx="0" cy="-5.5" rx="4.5" ry="7.5" fill="#5cb830" transform="rotate(72)"/>
    <ellipse cx="0" cy="-5.5" rx="4.5" ry="7.5" fill="#5cb830" transform="rotate(144)"/>
    <ellipse cx="0" cy="-5.5" rx="4.5" ry="7.5" fill="#5cb830" transform="rotate(216)"/>
    <ellipse cx="0" cy="-5.5" rx="4.5" ry="7.5" fill="#5cb830" transform="rotate(288)"/>
    <!-- petal highlights -->
    <ellipse cx="0" cy="-5.5" rx="2" ry="5" fill="#8fd45a" opacity="0.35" transform="rotate(0)"/>
    <ellipse cx="0" cy="-5.5" rx="2" ry="5" fill="#8fd45a" opacity="0.35" transform="rotate(72)"/>
    <ellipse cx="0" cy="-5.5" rx="2" ry="5" fill="#8fd45a" opacity="0.35" transform="rotate(144)"/>
    <ellipse cx="0" cy="-5.5" rx="2" ry="5" fill="#8fd45a" opacity="0.35" transform="rotate(216)"/>
    <ellipse cx="0" cy="-5.5" rx="2" ry="5" fill="#8fd45a" opacity="0.35" transform="rotate(288)"/>
    <!-- centre -->
    <circle cx="0" cy="0" r="3.8" fill="#1c1208"/>
    <!-- stamen -->
    <circle cx="0" cy="-1.5" r="1.2" fill="#8fd45a"/>
  </g>
</svg>
